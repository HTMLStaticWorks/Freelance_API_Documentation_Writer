<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | APIForge</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <!-- Fonts & CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">

<body class="bg-light-subtle position-relative overflow-hidden">
    <div class="position-fixed top-0 end-0 m-3 m-md-4 d-flex gap-2 z-3">
        <button class="btn btn-sm btn-outline-secondary theme-toggle shadow-sm" aria-label="Toggle theme">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
        <button class="btn btn-sm btn-outline-secondary rtl-toggle shadow-sm btn-rtl-text" aria-label="Toggle RTL">
            RTL
        </button>
    </div>
    <div class="container vh-100 d-flex align-items-center justify-content-center">
        <div class="text-center" data-aos="zoom-in">
            <a href="index.html" class="d-block mb-4">
                <img src="assets/images/logo2.png" alt="Logo" class="brand-logo mx-auto">
            </a>
            <h1 class="display-1 fw-bold text-primary mb-0">404</h1>
            <div class="terminal-window my-5 mx-auto" style="max-width: 500px;">
                <div class="terminal-header">
                    <span class="text-muted small mono-font">error.log</span>
                </div>
                <div class="p-4 text-start">
                    <pre class="m-0"><code class="text-danger">[ERROR] 404: Endpoint not found
[DEBUG] Path: /requested-page
[DEBUG] Status: Resource missing or moved
[SYSTEM] Recommendation: Return to base</code></pre>
                </div>
            </div>
            <h2 class="h4 fw-bold mb-4">The requested documentation page does not exist.</h2>
            <div class="d-flex gap-3 justify-content-center">
                <a href="index.html" class="btn btn-primary px-4">Go Home</a>
                <a href="api-samples.html" class="btn btn-outline-primary px-4">View Samples</a>
            </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
