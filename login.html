<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | APIForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light-subtle position-relative overflow-hidden">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="container vh-100 d-flex align-items-center justify-content-center">
        <div class="card border-0 shadow-sm p-4 p-md-5 glass-card" style="max-width: 450px; width: 100%;" data-aos="zoom-in">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand fs-2 mb-3 d-block">APIForge</a>
                <h1 class="h4 fw-bold">Welcome Back</h1>
                <p class="text-muted small">Enter your credentials to access your dashboard</p>
            </div>
            <form>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@company.com" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label small fw-bold text-uppercase">Password</label>
                        <a href="#" class="small text-decoration-none">Forgot?</a>
                    </div>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">Login to APIForge</button>
                <div class="text-center">
                    <p class="small text-muted mb-0">Don't have an account? <a href="signup.html" class="text-decoration-none fw-bold">Sign Up</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
