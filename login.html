<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | APIForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page bg-image bg-overlay" style="background-image: url('assets/img/auth_bg.png');">
    <div class="position-fixed top-0 end-0 m-3 m-md-4 d-flex gap-2 z-3">
        <button id="rtl-toggle" class="btn btn-sm btn-primary border-0 shadow-sm px-2" title="Toggle RTL">
            RTL
        </button>
        <button id="theme-toggle" class="btn btn-sm btn-dark border-0 shadow-sm px-2" aria-label="Toggle theme">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
    </div>
    <div class="container d-flex align-items-center justify-content-center">
        <div class="card border-0 shadow-sm p-4 p-md-5 glass-card" style="max-width: 450px; width: 100%;" data-aos="zoom-in">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand fs-2 d-block"><img src="assets/images/logo2.png" alt="Logo" class="brand-logo"></a>
                <h1 class="h4 fw-bold">Welcome Back</h1>
                <p class="text-muted small">Enter your credentials to access your dashboard</p>
            </div>
            <form>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@company.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase">Password</label>
                    <div class="password-field-container">
                        <input type="password" class="form-control pe-5" placeholder="••••••••" required>
                        <i class="bi bi-eye password-toggle"></i>
                    </div>
                </div>
                <div class="mb-4 d-flex justify-content-between align-items-center">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label small text-muted" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a href="#" class="small text-decoration-none fw-bold">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">Login to APIForge</button>
                
                <div class="social-login-divider">
                    <span>Or login with</span>
                </div>

                <div class="d-grid gap-2 mb-4">
                    <button type="button" class="btn btn-social">
                        <i class="bi bi-google"></i> Continue with Google
                    </button>
                    <button type="button" class="btn btn-social">
                        <i class="bi bi-apple"></i> Continue with Apple
                    </button>
                </div>

                <div class="text-center">
                    <p class="small text-muted mb-0">Don't have an account? <a href="signup.html" class="text-decoration-none fw-bold">Sign Up</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
